<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ethio Machinery Link (EML)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body { font-family: Arial; background:#111; color:white; text-align:center; }
    header { background:#f4b400; padding:20px; color:black; font-weight:bold; }
    button { margin:8px; padding:10px; border:none; border-radius:6px; cursor:pointer; }
    input, select, textarea {
      margin:8px; padding:10px; width:85%; max-width:350px;
      border-radius:6px; border:none;
    }
    .section { margin-top:30px; }
    .card {
      background:#222; margin:10px auto; padding:15px;
      width:90%; max-width:400px; border-radius:10px; text-align:left;
    }
  </style>
</head>
<body>

<header>
  Ethio Machinery Link (EML)<br>
  ኢትዮ ማሽነሪ አገናኝ
</header>

<button onclick="toggleLanguage()">🌐 Switch Language</button>

<div class="section">
<h2 id="postTitle">Post Listing</h2>

<select id="type">
  <option value="">Select Type</option>
  <option value="rent">Rent</option>
  <option value="sell">Sell</option>
  <option value="service">Service</option>
</select>

<input id="title" placeholder="Title" />

<div id="machineFields" style="display:none;">
  <input id="model_number" placeholder="Model Number" />
  <input id="year" placeholder="Year" />

  <select id="condition">
    <option value="">Condition</option>
    <option>New</option>
    <option>Used</option>
  </select>

  <input id="capacity" placeholder="Capacity" />

  <select id="fuel_type">
    <option value="">Fuel Type</option>
    <option>Diesel</option>
    <option>Petrol</option>
    <option>Electric</option>
  </select>

  <input id="price_type" placeholder="Price Type" />
  <input id="availability" placeholder="Availability" />
</div>

<div id="serviceFields" style="display:none;">
  <select id="service_type">
    <option value="">Service Type</option>
    <option value="mechanic">Mechanic</option>
    <option value="operator">Operator</option>
    <option value="transport">Transport</option>
    <option value="spare_parts">Spare Parts</option>
  </select>

  <textarea id="details" placeholder="Service details"></textarea>
</div>

<select id="category">
  <option value="">Category</option>
  <option>Excavator</option>
  <option>Bulldozer</option>
  <option>Crane</option>
  <option>Loader</option>
  <option>Generator</option>
  <option>Other</option>
</select>

<input id="customCategory" placeholder="Specify category" style="display:none;" />

<input id="price" placeholder="Price" />
<input id="location" placeholder="Location" />
<input id="phone" placeholder="Phone" />

<textarea id="specs" placeholder="Specifications"></textarea>
<textarea id="description" placeholder="Description"></textarea>

<button onclick="addListing()" id="submitBtn">Submit</button>
</div>

<div class="section">
<h2 id="browseTitle">Browse</h2>

<select id="filterType">
  <option value="">All</option>
  <option value="rent">Rent</option>
  <option value="sell">Sell</option>
  <option value="service">Service</option>
</select>

<div id="listings"></div>
</div>

<script>
const SUPABASE_URL = "https://rmdpzvyypnkhadoqoidr.supabase.co
";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtZHB6dnl5cG5raGFkb3FvaWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjI4OTUsImV4cCI6MjA4OTM5ODg5NX0.U02QOs4Cqq0TxB1mMu8oo_lOlv-4m6lBZfgk9Bsa8vA";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 🌐 LANGUAGE SYSTEM
let currentLang = "en";

const translations = {
  en: {
    post: "Post Listing",
    browse: "Browse",
    price: "Price",
    location: "Location",
    phone: "Phone",
    submit: "Submit"
  },
  am: {
    post: "መረጃ አስገባ",
    browse: "መፈለጊያ",
    price: "ዋጋ",
    location: "ቦታ",
    phone: "ስልክ",
    submit: "አስገባ"
  }
};

function toggleLanguage() {
  currentLang = currentLang === "en" ? "am" : "en";
  applyTranslations();
}

function applyTranslations() {
  const t = translations[currentLang];

  document.getElementById("postTitle").innerText = t.post;
  document.getElementById("browseTitle").innerText = t.browse;

  document.getElementById("price").placeholder = t.price;
  document.getElementById("location").placeholder = t.location;
  document.getElementById("phone").placeholder = t.phone;

  document.getElementById("submitBtn").innerText = t.submit;
}

// UI CONTROL
function updateUI() {
  const type = document.getElementById('type').value;
  document.getElementById('machineFields').style.display =
    (type === 'rent' || type === 'sell') ? 'block' : 'none';
  document.getElementById('serviceFields').style.display =
    (type === 'service') ? 'block' : 'none';
}

function handleCategory() {
  const cat = document.getElementById('category').value;
  document.getElementById('customCategory').style.display =
    (cat === 'Other') ? 'block' : 'none';
}

// ADD
async function addListing() {
  const type = document.getElementById('type').value;

  let category = document.getElementById('category').value;
  if (category === "Other") {
    category = document.getElementById('customCategory').value;
  }

  const data = {
    type,
    title: document.getElementById('title').value,
    category,
    price: document.getElementById('price').value,
    location: document.getElementById('location').value,
    phone: document.getElementById('phone').value,
    specs: document.getElementById('specs').value,
    description: document.getElementById('description').value
  };

  if (type === "service") {
    data.service_type = document.getElementById('service_type').value;
    data.details = document.getElementById('details').value;
  } else {
    data.model_number = document.getElementById('model_number').value;
    data.year = document.getElementById('year').value;
    data.condition = document.getElementById('condition').value;
    data.capacity = document.getElementById('capacity').value;
    data.fuel_type = document.getElementById('fuel_type').value;
    data.price_type = document.getElementById('price_type').value;
    data.availability = document.getElementById('availability').value;
  }

  await client.from('listings').insert([data]);
  alert("Saved!");
  loadListings();
}

// LOAD
async function loadListings() {
  const filter = document.getElementById('filterType').value;
  let query = client.from('listings').select('*');
  if (filter) query = query.eq('type', filter);

  const { data } = await query;
  const container = document.getElementById('listings');
  container.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement('div');
    div.className = "card";
    div.innerHTML = `
      <h3>${item.title} (${item.type})</h3>
      <p><b>${currentLang === 'am' ? 'ዋጋ' : 'Price'}:</b> ${item.price}</p>
      <p><b>${currentLang === 'am' ? 'ቦታ' : 'Location'}:</b> ${item.location}</p>
      <p>${item.description}</p>
    `;
    container.appendChild(div);
  });
}

// INIT
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById('type').addEventListener('change', updateUI);
  document.getElementById('category').addEventListener('change', handleCategory);
  document.getElementById('filterType').addEventListener('change', loadListings);

  updateUI();
  handleCategory();
  loadListings();
  applyTranslations();
});
</script>

</body>
</html>
