<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ethio Machinery Link (EML)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body { font-family: Arial; background: #111; color: white; text-align: center; }
    header { background: #f4b400; padding: 20px; color: black; font-weight: bold; }
    input, select, textarea, button {
      margin: 8px; padding: 10px; width: 85%; max-width: 350px;
      border-radius: 6px; border: none;
    }
    button { background: #f4b400; font-weight: bold; cursor: pointer; }
    .section { margin-top: 30px; }
    .card { background: #222; margin: 10px auto; padding: 15px; width: 90%; max-width: 400px; border-radius: 10px; }
  </style>
</head>
<body>

<header>
  Ethio Machinery Link (EML)<br>
  ኢትዮ ማሽነሪ አገናኝ
</header>

<!-- POST SECTION -->
<div class="section">
  <h2>Post Machinery / Service</h2>

  <select id="type" onchange="handleTypeChange()">
    <option value="">Select Type</option>
    <option value="rent">Rent</option>
    <option value="sell">Sell</option>
    <option value="service">Service</option>
  </select>

  <!-- SERVICE TYPE -->
  <select id="serviceType" style="display:none;">
    <option value="">Select Service Type</option>
    <option value="mechanic">Mechanic</option>
    <option value="operator">Operator</option>
    <option value="transport">Transport</option>
    <option value="spare_parts">Spare Parts</option>
  </select>

  <input id="title" placeholder="Title" />

  <select id="category" onchange="handleCategoryChange()">
    <option value="">Select Category</option>
    <option>Excavator</option>
    <option>Bulldozer</option>
    <option>Crane</option>
    <option>Loader</option>
    <option>Generator</option>
    <option>Other</option>
  </select>

  <input id="customCategory" placeholder="Specify category" style="display:none;" />

  <input id="price" placeholder="Price (or rate)" />
  <input id="location" placeholder="Location" />
  <input id="phone" placeholder="Phone Number" />

  <!-- DYNAMIC DETAILS -->
  <textarea id="details" placeholder="Enter service details (skills, capacity, experience...)" style="display:none;"></textarea>

  <textarea id="description" placeholder="General Description"></textarea>

  <button onclick="addListing()">Submit</button>
</div>

<!-- BROWSE -->
<div class="section">
  <h2>Browse</h2>

  <select id="filterType" onchange="loadListings()">
    <option value="">All</option>
    <option value="rent">Rent</option>
    <option value="sell">Sell</option>
    <option value="service">Service</option>
  </select>

  <div id="listings"></div>
</div>

<script>
  const SUPABASE_URL = "https://rmdpzvyypnkhadoqoidr.supabase.co
";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtZHB6dnl5cG5raGFkb3FvaWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjI4OTUsImV4cCI6MjA4OTM5ODg5NX0.U02QOs4Cqq0TxB1mMu8oo_lOlv-4m6lBZfgk9Bsa8vA";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function handleTypeChange() {
    const type = document.getElementById('type').value;
    const serviceType = document.getElementById('serviceType');
    const details = document.getElementById('details');

    if (type === "service") {
      serviceType.style.display = "block";
      details.style.display = "block";
    } else {
      serviceType.style.display = "none";
      details.style.display = "none";
    }
  }

  function handleCategoryChange() {
    const category = document.getElementById('category').value;
    const custom = document.getElementById('customCategory');

    if (category === "Other") {
      custom.style.display = "block";
    } else {
      custom.style.display = "none";
    }
  }

  async function addListing() {
    const type = document.getElementById('type').value;
    const service_type = document.getElementById('serviceType').value;
    const title = document.getElementById('title').value;

    let category = document.getElementById('category').value;
    const customCategory = document.getElementById('customCategory').value;
    if (category === "Other") category = customCategory;

    const price = document.getElementById('price').value;
    const location = document.getElementById('location').value;
    const phone = document.getElementById('phone').value;
    const description = document.getElementById('description').value;
    const details = document.getElementById('details').value;

    await client.from('listings').insert([
      { type, service_type, title, category, price, location, phone, description, details }
    ]);

    alert("Saved!");
    loadListings();
  }

  async function loadListings() {
    const filter = document.getElementById('filterType').value;

    let query = client.from('listings').select('*');
    if (filter) query = query.eq('type', filter);

    const { data } = await query;

    const container = document.getElementById('listings');
    container.innerHTML = "";

    data.forEach(item => {
      const div = document.createElement('div');
      div.className = "card";

      div.innerHTML = `
        <h3>${item.title} (${item.type})</h3>
        ${item.service_type ? `<p><b>Service:</b> ${item.service_type}</p>` : ""}
        <p><b>Category:</b> ${item.category}</p>
        <p><b>Price:</b> ${item.price}</p>
        <p><b>Location:</b> ${item.location}</p>
        <p><b>Phone:</b> ${item.phone}</p>
        <p>${item.description}</p>
        ${item.details ? `<p><b>Details:</b> ${item.details}</p>` : ""}
      `;

      container.appendChild(div);
    });
  }

  loadListings();
</script>

</body>
</html>
