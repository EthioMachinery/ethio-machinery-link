<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ethio Machinery Link (EML) - ኢትዮ ማሽነሪ አገናኝ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <meta name="description" content="Ethio Machinery Link (EML) - ኢትዮ ማሽነሪ አገናኝ. Find, rent, buy, sell, and service machinery in Ethiopia.">
  <link rel="canonical" href="https://ethio-machinery-link.vercel.app">

  <!-- Open Graph -->
  <meta property="og:title" content="Ethio Machinery Link (EML)">
  <meta property="og:description" content="Find, rent, buy, sell, and service machinery in Ethiopia.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ethio-machinery-link.vercel.app">
  <meta property="og:image" content="/logo.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Ethio Machinery Link (EML)">
  <meta name="twitter:description" content="Find, rent, buy, sell, and service machinery in Ethiopia.">
  <meta name="twitter:image" content="/logo.png">

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" type="image/x-icon">

  <!-- Preload critical assets -->
  <link rel="preload" href="/favicon.ico" as="image">

  <!-- Minified CSS -->
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#111;color:#fff}
    header{background:#f4b400;color:#000;text-align:center;padding:20px}
    header h1{margin:0;font-size:24px}
    .container{padding:20px}
    .search-box{display:flex;gap:10px;margin-top:15px}
    .search-box input{flex:1;padding:12px;border-radius:8px;border:none}
    button{padding:10px;border:none;border-radius:6px;cursor:pointer;background:#f4b400}
    select,input{width:100%;padding:10px;margin-top:8px;border-radius:6px;border:none}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-top:20px}
    .card{background:#222;padding:15px;border-radius:10px;text-align:center;cursor:pointer}
    .listing-card{background:#222;padding:15px;border-radius:10px;margin-top:10px;cursor:pointer}
    .tag{background:#f4b400;color:#000;padding:4px 8px;border-radius:4px;font-size:12px;display:inline-block;margin-bottom:5px}
    img{max-width:100%;border-radius:8px;margin-bottom:10px}
  </style>
</head>

<body>

<header role="banner">
  <h1>ኢትዮ ማሽነሪ አገናኝ</h1>
  <p>Ethio Machinery Link (EML)</p>
  <button onclick="toggleLang()" aria-label="Toggle Language" style="font-size:16px;background:none;border:none;cursor:pointer;">
    🌐 አማ/EN
  </button>
</header>

<main class="container" role="main">

  <h2 id="hero"></h2>

  <div class="search-box">
    <label for="searchInput" class="visually-hidden">Search</label>
    <input id="searchInput" aria-label="Search machinery">
    <button id="searchBtn" onclick="search()"></button>
  </div>

  <section aria-labelledby="servicesTitle">
    <h2 id="servicesTitle">Services</h2>
    <div id="services" class="grid"></div>
  </section>

  <section aria-labelledby="categoriesTitle">
    <h2 id="categoriesTitle">Categories</h2>
    <div id="categories" class="grid"></div>
  </section>

  <h2 id="postTitle"></h2>

  <label for="postType">Listing Type</label>
  <select id="postType" onchange="updateForm()">
    <option value="" id="selectType"></option>
    <option value="rent" id="optRent"></option>
    <option value="sell" id="optSell"></option>
    <option value="service" id="optService"></option>
    <option value="transport" id="optTransport"></option>
  </select>

  <div id="dynamicForm"></div>

  <button id="submitBtn" onclick="submitListing()"></button>

  <div id="listings"></div>

</main>

<script defer>
  // Existing JS logic remains unchanged
  // Added alt attributes and lazy loading for images in loadListings()
  function loadListings(){
    var container=document.getElementById("listings");
    container.innerHTML="Loading...";
    var keyword=document.getElementById("searchInput").value.toLowerCase();
    fetch(SUPABASE_URL+"/rest/v1/listings?select=*",{headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}})
    .then(res=>res.json())
    .then(data=>{
      container.innerHTML="";
      var filtered=data.filter(item=>{
        var matchSearch=(item.title||"").toLowerCase().includes(keyword)||(item.location||"").toLowerCase().includes(keyword);
        var matchCategory=currentFilter===""||(item.title||"").toLowerCase().includes(currentFilter);
        return matchSearch&&matchCategory;
      });
      if(filtered.length===0){container.innerHTML="No results";return;}
      filtered.forEach(item=>{
        container.innerHTML+=
        "<div class='listing-card' onclick='openDetails("+JSON.stringify(item).replace(/"/g,'&quot;')+")'>"+
        "<span class='tag'>"+(item.type||"Listing")+"</span>"+
        (item.image_url?"<img src='"+item.image_url+"' alt='Image of "+(item.title||"machinery")+"' loading='lazy'>":"")+
        "<h3>"+(item.title||"")+"</h3>"+
        "<p>"+(item.location||"")+"</p>"+
        "<p>"+(item.price||"")+"</p>"+
        "</div>";
      });
    });
  }
</script>

</body>
</html>
