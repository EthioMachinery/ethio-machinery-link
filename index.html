/* 🛡 SAFE FETCH */
async function safeFetch(url, options={}){
try{
const res = await fetch(url, options);
return await res.json();
}catch(e){
console.log("API failed");
return [];
}
}

/* 📥 LOAD FROM DATABASE */
async function loadListings(){

const data = await safeFetch(SUPABASE_URL + "/rest/v1/listings",{
headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + SUPABASE_KEY
}
});

renderListings(data);
}

/* 📤 SAVE */
async function saveListing(){

const payload={
title:"New Listing",
location:"Addis Ababa",
price:"0"
};

await safeFetch(SUPABASE_URL + "/rest/v1/listings",{
method:"POST",
headers:{
"Content-Type":"application/json",
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + SUPABASE_KEY
},
body:JSON.stringify(payload)
});

async function loadListings(){

try{

const res = await fetch(SUPABASE_URL + "/rest/v1/listings?select=*",{
headers:{
"apikey": SUPABASE_KEY,
"Authorization": "Bearer " + SUPABASE_KEY
}
});

const data = await res.json();

console.log("✅ DATA FROM DB:", data);

/* 🔥 FORCE DISPLAY EVEN IF STRUCTURE DIFFERENT */
if(!data || data.length === 0){
document.getElementById("listings").innerHTML =
"<p style='color:white'>No data found</p>";
return;
}

const container = document.getElementById("listings");
container.innerHTML = "";

data.forEach(i=>{

const d = document.createElement("div");
d.className = "listing-card";

d.innerHTML = `
<h3>${i.title || "No Title"}</h3>
<p>${i.type || ""}</p>
<p>${i.location || ""}</p>
<p>${i.price || ""}</p>
`;

container.appendChild(d);

});

}catch(err){

console.log("❌ ERROR:", err);

document.getElementById("listings").innerHTML =
"<p style='color:red'>Error loading data</p>";

}
};
}

/* 🎨 RENDER LISTINGS */
function renderListings(data){

const container=document.getElementById("listings");
container.innerHTML="";

if(!data.length){
container.innerHTML="<p>No data yet</p>";
return;
}

data.forEach(i=>{
const d=document.createElement("div");
d.className="listing-card";
d.innerHTML=`
<span class="tag">Listing</span>
<h3>${i.title || "No title"}</h3>
<p>${i.location || ""}</p>
<p>${i.price || ""}</p>
`;
container.appendChild(d);
});
}

/* 🔍 SEARCH */
async function search(){

const keyword=document.getElementById("searchInput").value.toLowerCase();

const data = await safeFetch(SUPABASE_URL + "/rest/v1/listings",{
headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + SUPABASE_KEY
}
});

const filtered=data.filter(i=>
(i.title||"").toLowerCase().includes(keyword)
);

renderListings(filtered);
}

/* 🌐 LANGUAGE */
function toggleLang(){

}

/* 🎨 UI */

document.getElementById("searchInput").placeholder=t.search;

const services=document.getElementById("services");
services.innerHTML="";

services.innerHTML+=`<div class="card">${s}</div>`;
});

const cat=document.getElementById("categories");
cat.innerHTML="";
t.categories.forEach(c=>{
cat.innerHTML+=`<div class="card">${c}</div>`;
});

}
