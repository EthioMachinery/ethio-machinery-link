<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ethio Machinery Link</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {margin:0;font-family:Arial;background:#111;color:#fff;}
header {background:#f4b400;color:black;text-align:center;padding:20px;}
.container {padding:20px;}

.search-box {display:flex;gap:10px;margin-top:15px;}
.search-box input {flex:1;padding:12px;border-radius:8px;border:none;}

button {padding:10px;border:none;border-radius:6px;cursor:pointer;background:#f4b400;}

select, input {
width:100%;
padding:10px;
margin-top:8px;
border-radius:6px;
border:none;
}

.grid {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin-top:20px;
}

.card {
background:#222;
padding:15px;
border-radius:10px;
text-align:center;
}

.listing-card {
background:#222;
padding:15px;
border-radius:10px;
margin-top:10px;
}

.tag {
background:#f4b400;
color:black;
padding:4px 8px;
border-radius:4px;
font-size:12px;
}
</style>
</head>

<body>

<header>
<h2>ኢትዮ ማሽነሪ አገናኝ</h2>
<p>Ethio Machinery Link (EML)</p>
<button onclick="toggleLang()">🌐</button>
</header>

<div class="container">

<h2 id="hero"></h2>

<div class="search-box">
<input id="searchInput">
<button onclick="search()">🔍</button>
</div>

<!-- SERVICES -->
<div id="services" class="grid"></div>

<!-- CATEGORIES -->
<div id="categories" class="grid"></div>

<!-- POST FORM -->
<h2>Post Listing</h2>

<select id="postType" onchange="updateForm()">
<option value="">Select Type</option>
<option value="rent">Rent Machinery</option>
<option value="sell">Sell Machinery</option>
<option value="service">Service Provider</option>
<option value="transport">Transport</option>
</select>

<div id="dynamicForm"></div>

<button onclick="submitListing()">Submit</button>

<!-- LISTINGS -->
<div id="listings"></div>

</div>

<script>

/* 🌐 LANGUAGE */
let lang="en";

const T={
en:{
hero:"Find, Rent, Buy Machinery",
search:"Search...",
services:["Rent","Buy","Sell","Service","Transport"],
categories:["Excavator","Bulldozer","Crane","Loader"]
},
am:{
hero:"ማሽነሪ ፈልግ ኪራይ ግዢ",
search:"ፈልግ...",
services:["ኪራይ","ግዢ","ሽያጭ","አገልግሎት","ትራንስፖርት"],
categories:["ኤክስካቫተር","ቡልዶዘር","ክሬን","ሎደር"]
}
};

/* 🎨 UI */
function renderUI(){

const t=T[lang];

document.getElementById("hero").innerText=t.hero;
document.getElementById("searchInput").placeholder=t.search;

const services=document.getElementById("services");
services.innerHTML="";
t.services.forEach(s=>{
services.innerHTML+=`<div class="card">${s}</div>`;
});

const cat=document.getElementById("categories");
cat.innerHTML="";
t.categories.forEach(c=>{
cat.innerHTML+=`<div class="card">${c}</div>`;
});

}

/* 📦 LOAD LISTINGS (DEMO FOR NOW) */
function loadListings(){

const container=document.getElementById("listings");
container.innerHTML="";

const demoData=[
{title:"Excavator CAT 320",location:"Addis Ababa",price:"5000 ETB/day"},
{title:"Bulldozer D6",location:"Adama",price:"2.5M ETB"},
{title:"Lowbed Transport",location:"Nationwide",price:"Negotiable"}
];

demoData.forEach(i=>{
container.innerHTML+=`
<div class="listing-card">
<span class="tag">Listing</span>
<h3>${i.title}</h3>
<p>${i.location}</p>
<p>${i.price}</p>
</div>
`;
});

}

/* 🔍 SEARCH */
function search(){

const keyword=document.getElementById("searchInput").value.toLowerCase();

const results=[
{title:"Excavator CAT 320",location:"Addis Ababa",price:"5000 ETB/day"},
{title:"Bulldozer D6",location:"Adama",price:"2.5M ETB"}
].filter(i=>i.title.toLowerCase().includes(keyword));

const container=document.getElementById("listings");
container.innerHTML="";

results.forEach(i=>{
container.innerHTML+=`
<div class="listing-card">
<h3>${i.title}</h3>
<p>${i.location}</p>
<p>${i.price}</p>
</div>
`;
});

}

/* 🌐 LANGUAGE */
function toggleLang(){
lang = (lang==="en")?"am":"en";
renderUI();
loadListings();
}

/* 🧠 DYNAMIC FORM */
function updateForm(){

const type=document.getElementById("postType").value;
const form=document.getElementById("dynamicForm");

form.innerHTML="";

if(type==="rent" || type==="sell"){
form.innerHTML=`
<input id="title" placeholder="Machine Name">
<input id="category" placeholder="Category">
<input id="model" placeholder="Model">
<input id="year" placeholder="Year">
<input id="capacity" placeholder="Capacity">
<input id="origin" placeholder="Country of Origin">
<input id="condition" placeholder="New / Used">
<input id="price" placeholder="Price">
<input id="location" placeholder="Location">
`;
}

else if(type==="service"){
form.innerHTML=`
<input id="title" placeholder="Service Title">
<input id="skill" placeholder="Skill">
<input id="experience" placeholder="Experience">
<input id="location" placeholder="Location">
`;
}

else if(type==="transport"){
form.innerHTML=`
<input id="title" placeholder="Transport Type">
<input id="truckType" placeholder="Truck Type">
<input id="capacity" placeholder="Capacity">
<input id="location" placeholder="Location">
`;
}

}

/* 🚀 SUBMIT */
function submitListing(){

const type=document.getElementById("postType").value;

if(!type){
alert("Please select type");
return;
}

let data={
type:type,
title:document.getElementById("title")?.value || "",
location:document.getElementById("location")?.value || ""
};

console.log("Submitted:", data);

alert("Listing submitted (demo mode)");

}

/* INIT */
renderUI();
loadListings();

</script>

</body>
</html>
