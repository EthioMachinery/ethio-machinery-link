<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ethio Machinery Link</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {margin:0;font-family:Arial;background:#111;color:#fff;}
header {background:#f4b400;color:black;text-align:center;padding:20px;}
.container {padding:20px;}
.search-box {display:flex;gap:10px;margin-top:15px;}
.search-box input {flex:1;padding:12px;border-radius:8px;border:none;}
button {padding:10px;border:none;border-radius:6px;cursor:pointer;background:#f4b400;}
select,input {width:100%;padding:10px;margin-top:8px;border-radius:6px;border:none;}
.grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-top:20px;}
.card {background:#222;padding:15px;border-radius:10px;text-align:center;}
.listing-card {background:#222;padding:15px;border-radius:10px;margin-top:10px;}
.tag {background:#f4b400;color:black;padding:4px 8px;border-radius:4px;font-size:12px;}
</style>
</head>

<body>

<header>
<h2>ኢትዮ ማሽነሪ አገናኝ</h2>
<p>Ethio Machinery Link (EML)</p>

<button onclick="toggleLang()" style="font-size:16px;background:none;border:none;cursor:pointer;">
🌐 አማ/EN
</button>
</header>

<div class="container">

<h2 id="hero"></h2>

<div class="search-box">
<input id="searchInput">
<button id="searchBtn" onclick="search()"></button>
</div>

<div id="services" class="grid"></div>
<div id="categories" class="grid"></div>

<h2 id="postTitle"></h2>

<select id="postType" onchange="updateForm()">
<option value="" id="selectType"></option>
<option value="rent" id="optRent"></option>
<option value="sell" id="optSell"></option>
<option value="service" id="optService"></option>
<option value="transport" id="optTransport"></option>
</select>

<div id="dynamicForm"></div>

<button id="submitBtn" onclick="submitListing()"></button>

<div id="listings"></div>

</div>

<script>

console.log("EML FINAL STABLE");

/* SUPABASE */
const SUPABASE_URL = "https://rmdpzvyypnkhadoqoidr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtZHB6dnl5cG5raGFkb3FvaWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjI4OTUsImV4cCI6MjA4OTM5ODg5NX0.U02QOs4Cqq0TxB1mMu8oo_lOlv-4m6lBZfgk9Bsa8vA";

/* LANGUAGE */
var lang = "en";

var T = {
en:{
hero:"Find, Rent, Buy Machinery",
search:"Search...",
searchBtn:"Search",
services:["Rent","Buy","Sell","Service","Transport"],
categories:["Excavator","Bulldozer","Crane","Loader"],
postTitle:"Post Listing",
selectType:"Select Type",
submit:"Submit",
optRent:"Rent Machinery",
optSell:"Sell Machinery",
optService:"Service Provider",
optTransport:"Transport"
},
am:{
hero:"ማሽነሪ ፈልግ ኪራይ ግዢ",
search:"ፈልግ...",
searchBtn:"ፈልግ",
services:["ኪራይ","ግዢ","ሽያጭ","አገልግሎት","ትራንስፖርት"],
categories:["ኤክስካቫተር","ቡልዶዘር","ክሬን","ሎደር"],
postTitle:"ማስታወቂያ አስገባ",
selectType:"አይነት ምረጥ",
submit:"አስገባ",
optRent:"ኪራይ ማሽነሪ",
optSell:"ሽያጭ ማሽነሪ",
optService:"አገልግሎት",
optTransport:"ትራንስፖርት"
}
};

function renderUI(){
try{
var t = T[lang];

document.getElementById("hero").innerText = t.hero;
document.getElementById("searchInput").placeholder = t.search;
document.getElementById("searchBtn").innerText = t.searchBtn;

document.getElementById("postTitle").innerText = t.postTitle;
document.getElementById("selectType").innerText = t.selectType;
document.getElementById("submitBtn").innerText = t.submit;

document.getElementById("optRent").innerText = t.optRent;
document.getElementById("optSell").innerText = t.optSell;
document.getElementById("optService").innerText = t.optService;
document.getElementById("optTransport").innerText = t.optTransport;

/* SERVICES */
var s = document.getElementById("services");
s.innerHTML = "";
for(var i=0;i<t.services.length;i++){
s.innerHTML += "<div class='card'>" + t.services[i] + "</div>";
}

/* CATEGORIES */
var c = document.getElementById("categories");
c.innerHTML = "";
for(var j=0;j<t.categories.length;j++){
c.innerHTML += "<div class='card'>" + t.categories[j] + "</div>";
}

}catch(e){
console.log("UI ERROR:", e);
}
}

function toggleLang(){
lang = (lang === "en") ? "am" : "en";
renderUI();
updateForm(); // 🔥 keep form synced
}

function updateForm(){

var type = document.getElementById("postType").value;
var form = document.getElementById("dynamicForm");
form.innerHTML = "";

if(type === "rent" || type === "sell"){
form.innerHTML =
"<input id='title' placeholder='" + (lang==="en"?"Machine Name":"የማሽነሪ ስም") + "'>" +
"<input id='price' placeholder='" + (lang==="en"?"Price":"ዋጋ") + "'>" +
"<input id='location' placeholder='" + (lang==="en"?"Location":"ቦታ") + "'>";
}

if(type === "service"){
form.innerHTML =
"<input id='title' placeholder='" + (lang==="en"?"Service Title":"የአገልግሎት ርዕስ") + "'>" +
"<input id='location' placeholder='" + (lang==="en"?"Location":"ቦታ") + "'>";
}

if(type === "transport"){
form.innerHTML =
"<input id='title' placeholder='" + (lang==="en"?"Transport Type":"የትራንስፖርት አይነት") + "'>" +
"<input id='location' placeholder='" + (lang==="en"?"Location":"ቦታ") + "'>";
}

}

async function submitListing(){

var title = document.getElementById("title");
var location = document.getElementById("location");
var price = document.getElementById("price");

if(!title || !location){
alert(lang==="en"?"Please fill the form":"እባክዎ ፎርሙን ይሙሉ");
return;
}

var data = {
title: title.value,
location: location.value,
price: price ? price.value : ""
};

try{

var res = await fetch(SUPABASE_URL + "/rest/v1/listings",{
method:"POST",
headers:{
"Content-Type":"application/json",
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + SUPABASE_KEY
},
body: JSON.stringify(data)
});

if(!res.ok){
throw new Error("Insert failed");
}

alert(lang==="en"?"Listing submitted":"ተሳክቷል");
document.getElementById("dynamicForm").innerHTML="";
document.getElementById("postType").value="";

loadListings();

}catch(err){
console.log(err);
alert(lang==="en"?"Submission failed":"ስህተት ተፈጥሯል");
}

}

async function loadListings(){

var container = document.getElementById("listings");
container.innerHTML = "Loading...";

try{

var res = await fetch(SUPABASE_URL + "/rest/v1/listings?select=*",{
headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + SUPABASE_KEY
}
});

var data = await res.json();

container.innerHTML = "";

if(!data || data.length === 0){
container.innerHTML = "No listings yet";
return;
}

for(var i=0;i<data.length;i++){
var item = data[i];
container.innerHTML +=
"<div class='listing-card'>" +
"<h3>" + (item.title || "") + "</h3>" +
"<p>" + (item.location || "") + "</p>" +
"<p>" + (item.price || "") + "</p>" +
"</div>";
}

}catch(err){
console.log(err);
container.innerHTML = "Failed to load listings";
}

}

function search(){
loadListings();
}

/* INIT */
renderUI();
loadListings();

</script>

</body>
</html>
