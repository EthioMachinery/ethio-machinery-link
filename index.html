<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ethio Machinery Link (EML)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }
    header {
      background: #f4b400;
      padding: 20px;
      color: black;
      font-size: 22px;
      font-weight: bold;
    }
    input, select, textarea, button {
      margin: 10px;
      padding: 10px;
      width: 85%;
      max-width: 350px;
      border-radius: 6px;
      border: none;
    }
    button {
      background: #f4b400;
      font-weight: bold;
      cursor: pointer;
    }
    .card {
      background: #222;
      margin: 15px auto;
      padding: 15px;
      width: 90%;
      max-width: 400px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<header>
  Ethio Machinery Link (EML)<br>
  ኢትዮ ማሽነሪ አገናኝ
</header>

<h2>Post Machinery</h2>

<select id="type">
  <option value="">Select Type</option>
  <option value="rent">Rent</option>
  <option value="sell">Sell</option>
  <option value="service">Service</option>
</select>

<input id="title" placeholder="Machine Title" />

<select id="category">
  <option value="">Select Category</option>
  <option>Excavator</option>
  <option>Bulldozer</option>
  <option>Crane</option>
  <option>Loader</option>
  <option>Generator</option>
  <option>Other</option>
</select>

<input id="price" placeholder="Price" />
<input id="location" placeholder="Location" />
<input id="phone" placeholder="Phone Number" />

<textarea id="description" placeholder="Description"></textarea>

<button onclick="addListing()">Submit</button>

<h2>Listings</h2>
<div id="listings"></div>

<script>
  const SUPABASE_URL = "https://rmdpzvyypnkhadoqoidr.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtZHB6dnl5cG5raGFkb3FvaWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjI4OTUsImV4cCI6MjA4OTM5ODg5NX0.U02QOs4Cqq0TxB1mMu8oo_lOlv-4m6lBZfgk9Bsa8vA";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function addListing() {
    const type = document.getElementById('type').value;
    const title = document.getElementById('title').value;
    const category = document.getElementById('category').value;
    const price = document.getElementById('price').value;
    const location = document.getElementById('location').value;
    const phone = document.getElementById('phone').value;
    const description = document.getElementById('description').value;

    await client.from('listings').insert([
      { type, title, category, price, location, phone, description }
    ]);

    alert("Saved!");
    loadListings();
  }

  async function loadListings() {
    const { data } = await client.from('listings').select('*');

    const container = document.getElementById('listings');
    container.innerHTML = "";

    data.forEach(item => {
      const div = document.createElement('div');
      div.className = "card";
      div.innerHTML = `
        <h3>${item.title} (${item.type})</h3>
        <p><b>Category:</b> ${item.category}</p>
        <p><b>Price:</b> ${item.price}</p>
        <p><b>Location:</b> ${item.location}</p>
        <p><b>Phone:</b> ${item.phone}</p>
        <p>${item.description}</p>
      `;
      container.appendChild(div);
    });
  }

  loadListings();
</script>

</body>
</html>
