<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ethio Machinery Link</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {font-family:Arial;background:#111;color:#fff;text-align:center;}
header {background:#f4b400;padding:15px;}
input,select,textarea,button {
margin:5px;padding:10px;border-radius:6px;border:none;
}
.card {
background:#222;margin:10px;padding:10px;border-radius:8px;
}
</style>
</head>

<body>

<header>
<h2 id="amh">ኢትዮ ማሽነሪ አገናኝ</h2>
<p id="eng">Ethio Machinery Link</p>
</header>

<button id="langBtn">🌐 Switch Language</button>

<h3 id="postTitle">Post Listing</h3>

<select id="type" onchange="showFields()"></select>
<input id="title">
<input id="category">

<div id="transportFields" style="display:none;">
<input id="truck_type">
<input id="capacity_ton">
<input id="coverage_area">
</div>

<input id="location">
<input id="price">

<button id="submitBtn">Submit</button>

<hr>

<h3 id="requestTitle">Request</h3>

<input id="req_category">
<input id="req_location">
<input id="req_type">

<button id="reqBtn">Submit Request</button>

<hr>

<h3 id="matchTitle">Matches</h3>
<div id="matches"></div>

<script>

const SUPABASE_URL="https://rmdpzvyypnkhadoqoidr.supabase.co
";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtZHB6dnl5cG5raGFkb3FvaWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjI4OTUsImV4cCI6MjA4OTM5ODg5NX0.U02QOs4Cqq0TxB1mMu8oo_lOlv-4m6lBZfgk9Bsa8vA";
const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let lang="en";

const T={
en:{
post:"Post Listing",submit:"Submit",request:"Request",
match:"Matches",lang:"🌐 Switch Language",
title:"Title",category:"Category",location:"Location",
price:"Price",truck:"Truck Type",capacity:"Capacity",
coverage:"Coverage",req:"Submit Request",
type:[["","Select"],["rent","Rent"],["sell","Sell"],["service","Service"],["transport","Transport"]]
},
am:{
post:"መረጃ አስገባ",submit:"አስገባ",request:"ጥያቄ",
match:"ተመሳሳይ",lang:"🌐 ቋንቋ ቀይር",
title:"ርዕስ",category:"ምድብ",location:"ቦታ",
price:"ዋጋ",truck:"የመኪና አይነት",capacity:"ክብደት",
coverage:"አካባቢ",req:"ጥያቄ ላክ",
type:[["","ምረጥ"],["rent","ኪራይ"],["sell","ሽያጭ"],["service","አገልግሎት"],["transport","ትራንስፖርት"]]
}
};

function setOptions(){
const el=document.getElementById("type");
el.innerHTML="";
T[lang].type.forEach(([v,t])=>{
const o=document.createElement("option");
o.value=v;o.textContent=t;
el.appendChild(o);
});
}

function applyLang(){
const t=T[lang];

document.getElementById("postTitle").innerText=t.post;
document.getElementById("submitBtn").innerText=t.submit;
document.getElementById("requestTitle").innerText=t.request;
document.getElementById("matchTitle").innerText=t.match;
document.getElementById("langBtn").innerText=t.lang;
document.getElementById("reqBtn").innerText=t.req;

document.getElementById("title").placeholder=t.title;
document.getElementById("category").placeholder=t.category;
document.getElementById("location").placeholder=t.location;
document.getElementById("price").placeholder=t.price;

document.getElementById("truck_type").placeholder=t.truck;
document.getElementById("capacity_ton").placeholder=t.capacity;
document.getElementById("coverage_area").placeholder=t.coverage;

document.getElementById("req_category").placeholder=t.category;
document.getElementById("req_location").placeholder=t.location;
document.getElementById("req_type").placeholder="type";

setOptions();
}

document.getElementById("langBtn").onclick=()=>{
lang=lang==="en"?"am":"en";
applyLang();
};

function showFields(){
const type=document.getElementById("type").value;
document.getElementById("transportFields").style.display=
(type==="transport")?"block":"none";
}

document.getElementById("submitBtn").onclick=async ()=>{
await client.from("listings").insert([{
type:type.value,
title:title.value,
category:category.value,
location:location.value,
price:price.value,
truck_type:truck_type.value,
capacity_ton:capacity_ton.value,
coverage_area:coverage_area.value
}]);
alert("Saved");
};

document.getElementById("reqBtn").onclick=async ()=>{
const req={
category:req_category.value.toLowerCase(),
location:req_location.value.toLowerCase(),
type:req_type.value.toLowerCase()
};

const {data}=await client.from("listings").select("*");

const matches=data.filter(i=>
i.category?.toLowerCase().includes(req.category) &&
i.location?.toLowerCase().includes(req.location) &&
i.type?.toLowerCase().includes(req.type)
);

const c=document.getElementById("matches");
c.innerHTML="";

matches.forEach(m=>{
const d=document.createElement("div");
d.className="card";
d.innerHTML=`<h4>${m.title}</h4><p>${m.location}</p><p>${m.price}</p>`;
c.appendChild(d);
});
};

applyLang();

</script>

</body>
</html>
