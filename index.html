<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ethio Machinery Link (EML)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; background:#111; color:white; text-align:center; }
header { background:#f4b400; padding:20px; color:black; font-weight:bold; }
button { margin:8px; padding:10px; border:none; border-radius:6px; cursor:pointer; }
input, select, textarea {
  margin:8px; padding:10px; width:85%; max-width:350px;
  border-radius:6px; border:none;
}
.section { margin-top:30px; }
.card {
  background:#222; margin:10px auto; padding:15px;
  width:90%; max-width:400px; border-radius:10px; text-align:left;
}
</style>
</head>

<body>

<header>
Ethio Machinery Link (EML)<br>
ኢትዮ ማሽነሪ አገናኝ
</header>

<button id="langBtn">🌐 Switch Language</button>

<div class="section">
<h2 id="postTitle">Post Listing</h2>

<select id="type"></select>
<input id="title" />

<div id="machineFields" style="display:none;">
  <input id="model_number" />
  <input id="year" />

  <select id="condition"></select>
  <input id="capacity" />

  <select id="fuel_type"></select>

  <input id="price_type" />
  <input id="availability" />
</div>

<div id="serviceFields" style="display:none;">
  <select id="service_type"></select>
  <textarea id="details"></textarea>
</div>

<select id="category"></select>
<input id="customCategory" style="display:none;" />

<input id="price" />
<input id="location" />
<input id="phone" />

<textarea id="specs"></textarea>
<textarea id="description"></textarea>

<button id="submitBtn">Submit</button>
</div>

<div class="section">
<h2 id="browseTitle">Browse</h2>

<select id="filterType"></select>
<div id="listings"></div>
</div>

<script>
const SUPABASE_URL = "https://rmdpzvyypnkhadoqoidr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtZHB6dnl5cG5raGFkb3FvaWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjI4OTUsImV4cCI6MjA4OTM5ODg5NX0.U02QOs4Cqq0TxB1mMu8oo_lOlv-4m6lBZfgk9Bsa8vA";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentLang = "en";

// 🌐 TRANSLATIONS (SAFE + COMPLETE)
const T = {
  en: {
    post:"Post Listing", browse:"Browse", submit:"Submit",
    placeholders:{
      title:"Title", model:"Model Number", year:"Year", capacity:"Capacity",
      priceType:"Price Type", availability:"Availability",
      details:"Service details", custom:"Specify category",
      price:"Price", location:"Location", phone:"Phone",
      specs:"Specifications", desc:"Description"
    },
    type:[["","Select Type"],["rent","Rent"],["sell","Sell"],["service","Service"]],
    condition:[["","Condition"],["new","New"],["used","Used"]],
    fuel:[["","Fuel Type"],["diesel","Diesel"],["petrol","Petrol"],["electric","Electric"]],
    category:[["","Category"],["excavator","Excavator"],["bulldozer","Bulldozer"],["crane","Crane"],["loader","Loader"],["generator","Generator"],["other","Other"]],
    service:[["","Service Type"],["mechanic","Mechanic"],["operator","Operator"],["transport","Transport"],["spare_parts","Spare Parts"]],
    filter:[["","All"],["rent","Rent"],["sell","Sell"],["service","Service"]]
  },

  am: {
    post:"መረጃ አስገባ", browse:"መፈለጊያ", submit:"አስገባ",
    placeholders:{
      title:"ርዕስ", model:"ሞዴል", year:"ዓመት", capacity:"አቅም",
      priceType:"የዋጋ አይነት", availability:"አለ/የለም",
      details:"የአገልግሎት መግለጫ", custom:"ምድብ ይግለጹ",
      price:"ዋጋ", location:"ቦታ", phone:"ስልክ",
      specs:"ዝርዝር መረጃ", desc:"መግለጫ"
    },
    type:[["","አይነት"],["rent","ኪራይ"],["sell","ሽያጭ"],["service","አገልግሎት"]],
    condition:[["","ሁኔታ"],["new","አዲስ"],["used","ያገለገለ"]],
    fuel:[["","ነዳጅ"],["diesel","ዲዘል"],["petrol","ፔትሮል"],["electric","ኤሌክትሪክ"]],
    category:[["","ምድብ"],["excavator","ኤክስካቫተር"],["bulldozer","ቡልዶዘር"],["crane","ክሬን"],["loader","ሎደር"],["generator","ጀነሬተር"],["other","ሌላ"]],
    service:[["","አገልግሎት"],["mechanic","መካኒክ"],["operator","ኦፕሬተር"],["transport","ትራንስፖርት"],["spare_parts","መለዋወጫ"]],
    filter:[["","ሁሉም"],["rent","ኪራይ"],["sell","ሽያጭ"],["service","አገልግሎት"]]
  }
};

// SAFE OPTION SETTER
function setOptions(id, arr){
  const el=document.getElementById(id);
  if(!el) return;
  const val=el.value;
  el.innerHTML="";
  arr.forEach(([v,t])=>{
    const o=document.createElement("option");
    o.value=v; o.textContent=t;
    if(v===val) o.selected=true;
    el.appendChild(o);
  });
}

// APPLY
function applyTranslations(){
  const t=T[currentLang];

  document.getElementById("postTitle").innerText=t.post;
  document.getElementById("browseTitle").innerText=t.browse;
  document.getElementById("submitBtn").innerText=t.submit;

  const p=t.placeholders;
  document.getElementById("title").placeholder=p.title;
  document.getElementById("model_number").placeholder=p.model;
  document.getElementById("year").placeholder=p.year;
  document.getElementById("capacity").placeholder=p.capacity;
  document.getElementById("price_type").placeholder=p.priceType;
  document.getElementById("availability").placeholder=p.availability;
  document.getElementById("details").placeholder=p.details;
  document.getElementById("customCategory").placeholder=p.custom;
  document.getElementById("price").placeholder=p.price;
  document.getElementById("location").placeholder=p.location;
  document.getElementById("phone").placeholder=p.phone;
  document.getElementById("specs").placeholder=p.specs;
  document.getElementById("description").placeholder=p.desc;

  setOptions("type",t.type);
  setOptions("condition",t.condition);
  setOptions("fuel_type",t.fuel);
  setOptions("category",t.category);
  setOptions("service_type",t.service);
  setOptions("filterType",t.filter);
}

// TOGGLE
function toggleLanguage(){
  currentLang=currentLang==="en"?"am":"en";
  applyTranslations();
}

// UI
function updateUI(){
  const type=document.getElementById("type").value;
  document.getElementById("machineFields").style.display=
    (type==="rent"||type==="sell")?"block":"none";
  document.getElementById("serviceFields").style.display=
    (type==="service")?"block":"none";
}

// ADD
async function addListing(){
  await client.from("listings").insert([{
    type:document.getElementById("type").value,
    title:document.getElementById("title").value,
    category:document.getElementById("category").value,
    price:document.getElementById("price").value,
    location:document.getElementById("location").value,
    phone:document.getElementById("phone").value,
    description:document.getElementById("description").value
  }]);
  alert("Saved!");
  loadListings();
}

// LOAD
async function loadListings(){
  const {data}=await client.from("listings").select("*");
  const c=document.getElementById("listings");
  c.innerHTML="";
  data.forEach(i=>{
    const d=document.createElement("div");
    d.className="card";
    d.innerHTML=`<h3>${i.title}</h3><p>${i.price}</p><p>${i.location}</p>`;
    c.appendChild(d);
  });
}

// INIT
document.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("langBtn").addEventListener("click",toggleLanguage);
  document.getElementById("type").addEventListener("change",updateUI);
  document.getElementById("submitBtn").addEventListener("click",addListing);

  applyTranslations();
  updateUI();
  loadListings();
});
</script>

</body>
</html>
