<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ethio Machinery Link</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {margin:0;font-family:Arial;background:#111;color:#fff;}
header {background:#f4b400;color:black;text-align:center;padding:20px;}
.container {padding:20px;}
.search-box {display:flex;gap:10px;margin-top:15px;}
.search-box input {flex:1;padding:12px;border-radius:8px;border:none;}
button {padding:10px;border:none;border-radius:6px;cursor:pointer;background:#f4b400;}
select,input {width:100%;padding:10px;margin-top:8px;border-radius:6px;border:none;}
.grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-top:20px;}
.card {background:#222;padding:15px;border-radius:10px;text-align:center;cursor:pointer;}
.listing-card {background:#222;padding:15px;border-radius:10px;margin-top:10px;cursor:pointer;}
.tag {background:#f4b400;color:black;padding:4px 8px;border-radius:4px;font-size:12px;display:inline-block;margin-bottom:5px;}
img {max-width:100%;border-radius:8px;margin-bottom:10px;}
</style>
</head>

<body>

<header>
<h2>ኢትዮ ማሽነሪ አገናኝ</h2>
<p>Ethio Machinery Link (EML)</p>

<button onclick="toggleLang()" style="font-size:16px;background:none;border:none;cursor:pointer;">
🌐 አማ/EN
</button>
</header>

<div class="container">

<h2 id="hero"></h2>

<div class="search-box">
<input id="searchInput">
<button id="searchBtn" onclick="search()"></button>
</div>

<div id="services" class="grid"></div>
<div id="categories" class="grid"></div>

<h2 id="postTitle"></h2>

<select id="postType" onchange="updateForm()">
<option value="" id="selectType"></option>
<option value="rent" id="optRent"></option>
<option value="sell" id="optSell"></option>
<option value="service" id="optService"></option>
<option value="transport" id="optTransport"></option>
</select>

<div id="dynamicForm"></div>

<button id="submitBtn" onclick="submitListing()"></button>

<div id="listings"></div>

</div>

<script>

console.log("EML DETAIL VIEW VERSION");

/* SUPABASE */
const SUPABASE_URL = "https://rmdpzvyypnkhadoqoidr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtZHB6dnl5cG5raGFkb3FvaWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjI4OTUsImV4cCI6MjA4OTM5ODg5NX0.U02QOs4Cqq0TxB1mMu8oo_lOlv-4m6lBZfgk9Bsa8vA";

/* LANGUAGE */
var lang = "en";

/* FILTER */
var currentFilter = "";

var T = {
en:{
hero:"Find, Rent, Buy Machinery",
search:"Search...",
searchBtn:"Search",
services:["Rent","Buy","Sell","Service","Transport"],
categories:["Excavator","Bulldozer","Crane","Loader"],
postTitle:"Post Listing",
selectType:"Select Type",
submit:"Submit",
optRent:"Rent Machinery",
optSell:"Sell Machinery",
optService:"Service Provider",
optTransport:"Transport"
},
am:{
hero:"ማሽነሪ ፈልግ ኪራይ ግዢ",
search:"ፈልግ...",
searchBtn:"ፈልግ",
services:["ኪራይ","ግዢ","ሽያጭ","አገልግሎት","ትራንስፖርት"],
categories:["ኤክስካቫተር","ቡልዶዘር","ክሬን","ሎደር"],
postTitle:"ማስታወቂያ አስገባ",
selectType:"አይነት ምረጥ",
submit:"አስገባ",
optRent:"ኪራይ ማሽነሪ",
optSell:"ሽያጭ ማሽነሪ",
optService:"አገልግሎት",
optTransport:"ትራንስፖርት"
}
};

function renderUI(){
var t = T[lang];

document.getElementById("hero").innerText = t.hero;
document.getElementById("searchInput").placeholder = t.search;
document.getElementById("searchBtn").innerText = t.searchBtn;

document.getElementById("postTitle").innerText = t.postTitle;
document.getElementById("selectType").innerText = t.selectType;
document.getElementById("submitBtn").innerText = t.submit;

document.getElementById("optRent").innerText = t.optRent;
document.getElementById("optSell").innerText = t.optSell;
document.getElementById("optService").innerText = t.optService;
document.getElementById("optTransport").innerText = t.optTransport;

/* SERVICES */
var s = document.getElementById("services");
s.innerHTML = "";
for(var i=0;i<t.services.length;i++){
s.innerHTML += "<div class='card'>" + t.services[i] + "</div>";
}

/* CATEGORIES */
var c = document.getElementById("categories");
c.innerHTML = "";
for(var j=0;j<t.categories.length;j++){
c.innerHTML += "<div class='card' onclick='filterCategory(\"" + t.categories[j] + "\")'>" + t.categories[j] + "</div>";
}
}

function toggleLang(){
lang = (lang === "en") ? "am" : "en";
renderUI();
updateForm();
}

function updateForm(){
var type = document.getElementById("postType").value;
var form = document.getElementById("dynamicForm");
form.innerHTML = "";

if(type === "rent" || type === "sell"){
form.innerHTML =
"<input id='title' placeholder='Machine Name'>" +
"<input id='price' placeholder='Price'>" +
"<input id='location' placeholder='Location'>" +
"<input type='file' id='image'>";
}

if(type === "service"){
form.innerHTML =
"<input id='title' placeholder='Service Title'>" +
"<input id='location' placeholder='Location'>" +
"<input type='file' id='image'>";
}

if(type === "transport"){
form.innerHTML =
"<input id='title' placeholder='Transport Type'>" +
"<input id='location' placeholder='Location'>" +
"<input type='file' id='image'>";
}
}

function filterCategory(category){
currentFilter = category.toLowerCase();
loadListings();
}

function search(){
currentFilter = "";
loadListings();
}

async function submitListing(){

var type = document.getElementById("postType").value;
var title = document.getElementById("title");
var location = document.getElementById("location");
var price = document.getElementById("price");
var imageFile = document.getElementById("image")?.files[0];

if(!title || !location){
alert("Fill required fields");
return;
}

var image_url = "";

if(imageFile){
var fileName = Date.now() + "_" + imageFile.name;

await fetch(SUPABASE_URL + "/storage/v1/object/machines/" + fileName,{
method:"POST",
headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + SUPABASE_KEY,
"Content-Type":imageFile.type
},
body:imageFile
});

image_url = SUPABASE_URL + "/storage/v1/object/public/machines/" + fileName;
}

var data = {
type:type,
title:title.value,
location:location.value,
price:price ? price.value : "",
image_url:image_url
};

await fetch(SUPABASE_URL + "/rest/v1/listings",{
method:"POST",
headers:{
"Content-Type":"application/json",
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + SUPABASE_KEY
},
body:JSON.stringify(data)
});

alert("Listing submitted");

document.getElementById("dynamicForm").innerHTML="";
document.getElementById("postType").value="";

loadListings();
}

/* 🔥 UPDATED LISTING (CLICKABLE) */
async function loadListings(){

var container = document.getElementById("listings");
container.innerHTML = "Loading...";

var keyword = document.getElementById("searchInput").value.toLowerCase();

var res = await fetch(SUPABASE_URL + "/rest/v1/listings?select=*",{
headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + SUPABASE_KEY
}
});

var data = await res.json();
container.innerHTML = "";

var filtered = data.filter(function(item){

var matchSearch =
(item.title || "").toLowerCase().includes(keyword) ||
(item.location || "").toLowerCase().includes(keyword);

var matchCategory =
currentFilter === "" ||
(item.title || "").toLowerCase().includes(currentFilter);

return matchSearch && matchCategory;
});

if(filtered.length === 0){
container.innerHTML = "No results";
return;
}

filtered.forEach(function(item){

container.innerHTML +=
"<div class='listing-card' onclick='openDetails(" + JSON.stringify(item).replace(/"/g,'&quot;') + ")'>" +
"<span class='tag'>" + (item.type || "Listing") + "</span>" +
(item.image_url ? "<img src='" + item.image_url + "'>" : "") +
"<h3>" + (item.title || "") + "</h3>" +
"<p>" + (item.location || "") + "</p>" +
"<p>" + (item.price || "") + "</p>" +
"</div>";

});
}

/* 🔥 DETAIL VIEW */
function openDetails(item){

var container = document.getElementById("listings");

container.innerHTML =
"<div class='listing-card'>" +

"<button onclick='loadListings()'>⬅ Back</button>" +

"<span class='tag'>" + (item.type || "Listing") + "</span>" +

(item.image_url ? "<img src='" + item.image_url + "'>" : "") +

"<h2>" + (item.title || "") + "</h2>" +

"<p><b>Location:</b> " + (item.location || "") + "</p>" +

(item.price ? "<p><b>Price:</b> " + item.price + "</p>" : "") +

"</div>";
}

/* INIT */
renderUI();
loadListings();

</script>

</body>
</html>
