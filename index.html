<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EML - Smart Machinery Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {font-family:Arial;margin:0;background:#111;color:#fff;}
header {
background:#f4b400;
padding:20px;
text-align:center;
color:black;
}
.container {padding:15px;}
button {
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
margin:5px;
}
.primary {background:#f4b400;}
.dark {background:#333;color:#fff;}
.card {
background:#222;
padding:15px;
margin:10px 0;
border-radius:10px;
}
.grid {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
}
input, select {
width:100%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:none;
}
</style>
</head>

<body>

<header>
<h2>ኢትዮ ማሽነሪ አገናኝ</h2>
<p>Ethio Machinery Link (EML)</p>
</header>

<div class="container">

<!-- SEARCH -->
<input id="search" placeholder="Search machinery, transport, services...">
<button class="primary" onclick="search()">Search</button>

<!-- ACTION BUTTONS -->
<div class="grid">
<button class="primary" onclick="showSection('post')">Post Listing</button>
<button class="primary" onclick="showSection('request')">Request Equipment</button>
<button class="primary" onclick="showSection('transport')">Offer Transport</button>
<button class="primary" onclick="showSection('service')">Offer Service</button>
</div>

<!-- POST -->
<div id="post" style="display:none;">
<h3>Post Listing</h3>
<select id="type">
<option value="rent">Rent</option>
<option value="sell">Sell</option>
</select>
<input id="title" placeholder="Machine Title">
<input id="category" placeholder="Category">
<input id="location" placeholder="Location">
<input id="price" placeholder="Price">
<button onclick="addListing()">Submit</button>
</div>

<!-- REQUEST -->
<div id="request" style="display:none;">
<h3>Request Machinery</h3>
<input id="req_category" placeholder="What do you need?">
<input id="req_location" placeholder="Location">
<button onclick="submitRequest()">Submit Request</button>
</div>

<!-- TRANSPORT -->
<div id="transport" style="display:none;">
<h3>Offer Transport</h3>
<input id="truck" placeholder="Truck Type (Lowbed, Highbed)">
<input id="capacity" placeholder="Capacity">
<input id="coverage" placeholder="Coverage Area">
<button onclick="alert('Saved')">Submit</button>
</div>

<!-- SERVICE -->
<div id="service" style="display:none;">
<h3>Offer Service</h3>
<input placeholder="Skill (Mechanic, Operator)">
<input placeholder="Experience">
<button onclick="alert('Saved')">Submit</button>
</div>

<!-- RESULTS -->
<h3>Listings</h3>
<div id="results"></div>

</div>

<script>

const SUPABASE_URL="https://rmdpzvyypnkhadoqoidr.supabase.co
";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtZHB6dnl5cG5raGFkb3FvaWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjI4OTUsImV4cCI6MjA4OTM5ODg5NX0.U02QOs4Cqq0TxB1mMu8oo_lOlv-4m6lBZfgk9Bsa8vA";
const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

function showSection(id){
["post","request","transport","service"].forEach(s=>{
document.getElementById(s).style.display="none";
});
document.getElementById(id).style.display="block";
}

async function addListing(){
await client.from("listings").insert([{
type:type.value,
title:title.value,
category:category.value,
location:location.value,
price:price.value
}]);
alert("Saved");
}

async function search(){
const keyword=document.getElementById("search").value.toLowerCase();
const {data}=await client.from("listings").select("*");

const res=document.getElementById("results");
res.innerHTML="";

data.filter(i=>
i.title?.toLowerCase().includes(keyword) ||
i.category?.toLowerCase().includes(keyword)
).forEach(i=>{
const d=document.createElement("div");
d.className="card";
d.innerHTML=`
<h4>${i.title}</h4>
<p>${i.category}</p>
<p>${i.location}</p>
<p>${i.price}</p>
<button>Request This</button>
`;
res.appendChild(d);
});
}

async function submitRequest(){
alert("Request submitted (Admin will contact you)");
}

</script>

</body>
</html>
