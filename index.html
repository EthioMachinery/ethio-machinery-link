<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EML Marketplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {margin:0;font-family:Arial;background:#111;color:#fff;}
header {background:#f4b400;color:black;text-align:center;padding:20px;}
.container {padding:15px;}
button {padding:10px;margin:5px;border:none;border-radius:6px;cursor:pointer;}
input,select {width:100%;padding:10px;margin:5px 0;border-radius:6px;border:none;}
.card {background:#222;padding:10px;margin:10px 0;border-radius:8px;}
</style>
</head>

<body>

<header>
<h2>ኢትዮ ማሽነሪ አገናኝ</h2>
<p>Ethio Machinery Link</p>
<button id="langBtn">🌐 Switch Language</button>
</header>

<div class="container">

<input id="searchInput">
<button id="searchBtn"></button>

<button id="postBtn"></button>

<div id="postSection">
<select id="type"></select>
<input id="title">
<input id="category">
<input id="location">
<input id="price">
<button id="submitBtn"></button>
</div>

<h3 id="listingTitle"></h3>
<div id="results"></div>

</div>

<script>

/* 🔐 SUPABASE */
const SUPABASE_URL = "https://rmdpzvyypnkhadoqoidr.supabase.co
";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtZHB6dnl5cG5raGFkb3FvaWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjI4OTUsImV4cCI6MjA4OTM5ODg5NX0.U02QOs4Cqq0TxB1mMu8oo_lOlv-4m6lBZfgk9Bsa8vA";

/* 🌐 LANGUAGE */
let lang="en";

const T={
en:{
search:"Search",
post:"Post Listing",
submit:"Submit",
listing:"Listings",
nodata:"No listings found",
title:"Title",
category:"Category",
location:"Location",
price:"Price",
type:[["rent","Rent"],["sell","Sell"]]
},
am:{
search:"ፈልግ",
post:"መረጃ አስገባ",
submit:"አስገባ",
listing:"ዝርዝር",
nodata:"ምንም ውጤት አልተገኘም",
title:"ርዕስ",
category:"ምድብ",
location:"ቦታ",
price:"ዋጋ",
type:[["rent","ኪራይ"],["sell","ሽያጭ"]]
}
};

function applyLang(){
const t=T[lang];

document.getElementById("searchBtn").innerText=t.search;
document.getElementById("postBtn").innerText=t.post;
document.getElementById("submitBtn").innerText=t.submit;
document.getElementById("listingTitle").innerText=t.listing;

document.getElementById("title").placeholder=t.title;
document.getElementById("category").placeholder=t.category;
document.getElementById("location").placeholder=t.location;
document.getElementById("price").placeholder=t.price;
document.getElementById("searchInput").placeholder=t.search;

const type=document.getElementById("type");
type.innerHTML="";
t.type.forEach(pair=>{
const opt=document.createElement("option");
opt.value=pair[0];
opt.textContent=pair[1];
type.appendChild(opt);
});
}

/* 🔄 LANGUAGE */
document.getElementById("langBtn").onclick=()=>{
lang = (lang==="en") ? "am":"en";
applyLang();
loadListings();
};

/* 📥 LOAD LISTINGS */
async function loadListings(){

try{
const res = await fetch(SUPABASE_URL + "/rest/v1/listings",{
headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + SUPABASE_KEY
}
});

const data = await res.json();

displayListings(data);

}catch(e){
console.log("Load error");
}
}

/* 🔍 SEARCH */
document.getElementById("searchBtn").onclick=async ()=>{

const keyword = document.getElementById("searchInput").value.toLowerCase();

try{
const res = await fetch(SUPABASE_URL + "/rest/v1/listings",{
headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + SUPABASE_KEY
}
});

const data = await res.json();

const filtered = data.filter(i=>
i.title?.toLowerCase().includes(keyword) ||
i.category?.toLowerCase().includes(keyword) ||
i.location?.toLowerCase().includes(keyword)
);

displayListings(filtered);

}catch(e){
alert("Error");
}

};

/* 🎨 DISPLAY */
function displayListings(data){

const results=document.getElementById("results");
results.innerHTML="";

if(!data || data.length===0){
results.innerHTML = `<p>${T[lang].nodata}</p>`;
return;
}

data.forEach(i=>{
const d=document.createElement("div");
d.className="card";
d.innerHTML=`
<h4>${i.title}</h4>
<p>${i.category}</p>
<p>${i.location}</p>
<p>${i.price}</p>
`;
results.appendChild(d);
});

}

/* 📤 SAVE */
document.getElementById("submitBtn").onclick=async ()=>{

const data = {
type:type.value,
title:title.value,
category:category.value,
location:location.value,
price:price.value
};

await fetch(SUPABASE_URL + "/rest/v1/listings",{
method:"POST",
headers:{
"Content-Type":"application/json",
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + SUPABASE_KEY
},
body:JSON.stringify(data)
});

alert(lang==="en"?"Saved":"ተመዝግቧል");

loadListings();
};

/* INIT */
applyLang();
loadListings();

</script>

</body>
</html>
