<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ethio Machinery Link (EML)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {margin:0;font-family:Arial;background:#111;color:#fff;}
header {background:#f4b400;color:black;text-align:center;padding:20px;}
.container {padding:15px;}
.grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;}
button {padding:10px;border:none;border-radius:6px;cursor:pointer;}
.primary {background:#f4b400;}
.card {background:#222;padding:10px;margin:10px 0;border-radius:10px;}
input,select {width:100%;padding:10px;margin:5px 0;border-radius:6px;border:none;}
.section {display:none;}
</style>
</head>

<body>

<header>
<h2>ኢትዮ ማሽነሪ አገናኝ</h2>
<p>Ethio Machinery Link (EML)</p>
<button id="langBtn">🌐 Switch Language</button>
</header>

<div class="container">

<!-- SEARCH -->
<input id="searchInput">
<button id="searchBtn"></button>

<!-- ACTIONS -->
<div class="grid">
<button class="primary" id="postBtn"></button>
<button class="primary" id="requestBtn"></button>
</div>

<!-- POST SECTION -->
<div id="postSection" class="section">
<h3 id="postTitle"></h3>
<select id="type"></select>
<input id="title">
<input id="category">
<input id="location">
<input id="price">
<button id="submitBtn"></button>
</div>

<!-- REQUEST SECTION -->
<div id="requestSection" class="section">
<h3 id="requestTitle"></h3>
<input id="req_category">
<input id="req_location">
<button id="submitReqBtn"></button>
</div>

<h3 id="listingTitle"></h3>
<div id="results"></div>

</div>

<script>

document.addEventListener("DOMContentLoaded", ()=>{

/* SAFE SUPABASE INIT */
let client = null;
try{
client = supabase.createClient("https://rmdpzvyypnkhadoqoidr.supabase.co
","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtZHB6dnl5cG5raGFkb3FvaWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjI4OTUsImV4cCI6MjA4OTM5ODg5NX0.U02QOs4Cqq0TxB1mMu8oo_lOlv-4m6lBZfgk9Bsa8vA");
}catch(e){
console.log("Supabase not connected");
}

/* LANGUAGE SYSTEM */
let lang="en";

const T={
en:{
search:"Search",
post:"Post Listing",
request:"Request Equipment",
submit:"Submit",
submitReq:"Submit Request",
listing:"Listings",
title:"Title",
category:"Category",
location:"Location",
price:"Price",
reqcat:"What do you need?",
type:[["rent","Rent"],["sell","Sell"]]
},
am:{
search:"ፈልግ",
post:"መረጃ አስገባ",
request:"ጥያቄ",
submit:"አስገባ",
submitReq:"ጥያቄ ላክ",
listing:"ዝርዝር",
title:"ርዕስ",
category:"ምድብ",
location:"ቦታ",
price:"ዋጋ",
reqcat:"ምን ይፈልጋሉ?",
type:[["rent","ኪራይ"],["sell","ሽያጭ"]]
}
};

function applyLang(){
const t=T[lang];

searchBtn.innerText=t.search;
postBtn.innerText=t.post;
requestBtn.innerText=t.request;
submitBtn.innerText=t.submit;
submitReqBtn.innerText=t.submitReq;
listingTitle.innerText=t.listing;

title.placeholder=t.title;
category.placeholder=t.category;
location.placeholder=t.location;
price.placeholder=t.price;
searchInput.placeholder=t.search;

req_category.placeholder=t.reqcat;
req_location.placeholder=t.location;

const type=document.getElementById("type");
type.innerHTML="";
t.type.forEach(([v,n])=>{
const o=document.createElement("option");
o.value=v;
o.textContent=n;
type.appendChild(o);
});
}

/* LANGUAGE TOGGLE */
langBtn.onclick=()=>{
lang = (lang==="en") ? "am":"en";
applyLang();
};

/* SECTION CONTROL */
postBtn.onclick=()=>{
postSection.style.display="block";
requestSection.style.display="none";
};

requestBtn.onclick=()=>{
postSection.style.display="none";
requestSection.style.display="block";
};

/* ADD LISTING */
submitBtn.onclick=async ()=>{
if(!client){alert("Backend not connected");return;}

try{
await client.from("listings").insert([{
type:type.value,
title:title.value,
category:category.value,
location:location.value,
price:price.value
}]);
alert("Saved");
}catch(e){
alert("Error saving");
}
};

/* SEARCH */
searchBtn.onclick=async ()=>{
if(!client){alert("Backend not connected");return;}

const keyword=searchInput.value.toLowerCase();
const {data}=await client.from("listings").select("*");

results.innerHTML="";

data.filter(i=>
i.title?.toLowerCase().includes(keyword) ||
i.category?.toLowerCase().includes(keyword)
).forEach(i=>{
const d=document.createElement("div");
d.className="card";
d.innerHTML=`
<h4>${i.title}</h4>
<p>${i.category}</p>
<p>${i.location}</p>
<p>${i.price}</p>
<button onclick="submitRequest()">${lang==="en"?"Request":"ጠይቅ"}</button>
`;
results.appendChild(d);
});
};

/* REQUEST */
function submitRequest(){
alert(lang==="en"?
"Request sent. Admin will contact you":
"ጥያቄ ተልኳል። አስተዳዳሪ ይደውላል");
}

/* INIT */
applyLang();

});

</script>

</body>
</html>
