<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ethio Machinery Link (EML)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }
    header {
      background: #f4b400;
      padding: 20px;
      color: black;
      font-size: 24px;
      font-weight: bold;
    }
    input, button {
      margin: 10px;
      padding: 10px;
      width: 80%;
      max-width: 300px;
    }
  </style>
</head>
<body>

<header>
  Ethio Machinery Link (EML)<br>
  ኢትዮ ማሽነሪ አገናኝ
</header>

<h2>Post Machinery</h2>

<input id="title" placeholder="Machine Title" />
<input id="category" placeholder="Category" />
<input id="price" placeholder="Price" />
<input id="location" placeholder="Location" />

<button onclick="addListing()">Submit</button>

<h2>Listings</h2>
<div id="listings"></div>

<script>
  const SUPABASE_URL = "https://rmdpzvyypnkhadoqoidr.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtZHB6dnl5cG5raGFkb3FvaWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjI4OTUsImV4cCI6MjA4OTM5ODg5NX0.U02QOs4Cqq0TxB1mMu8oo_lOlv-4m6lBZfgk9Bsa8vA";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function addListing() {
    const title = document.getElementById('title').value;
    const category = document.getElementById('category').value;
    const price = document.getElementById('price').value;
    const location = document.getElementById('location').value;

    await client.from('listings').insert([
      { title, category, price, location }
    ]);

    alert("Saved!");
    loadListings();
  }

  async function loadListings() {
    const { data } = await client.from('listings').select('*');

    const container = document.getElementById('listings');
    container.innerHTML = "";

    data.forEach(item => {
      const div = document.createElement('div');
      div.innerHTML = `<p>${item.title} - ${item.price} - ${item.location}</p>`;
      container.appendChild(div);
    });
  }

  loadListings();
</script>

</body>
</html>
