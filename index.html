<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EML Stable</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {margin:0;font-family:Arial;background:#111;color:#fff;}
header {background:#f4b400;color:black;text-align:center;padding:20px;}
.container {padding:15px;}
button {padding:10px;margin:5px;border:none;border-radius:6px;cursor:pointer;}
.primary {background:#f4b400;}
.card {background:#222;padding:10px;margin:10px 0;border-radius:10px;}
input,select {width:100%;padding:10px;margin:5px 0;border-radius:6px;border:none;}
.section {display:none;}
</style>
</head>

<body>

<header>
<h2>ኢትዮ ማሽነሪ አገናኝ</h2>
<p>Ethio Machinery Link</p>
<button id="langBtn">🌐 Switch Language</button>
</header>

<div class="container">

<input id="searchInput">
<button id="searchBtn"></button>

<button class="primary" id="postBtn"></button>
<button class="primary" id="requestBtn"></button>

<div id="postSection" class="section">
<select id="type"></select>
<input id="title">
<input id="category">
<input id="location">
<input id="price">
<button id="submitBtn"></button>
</div>

<div id="requestSection" class="section">
<input id="req_category">
<input id="req_location">
<button id="submitReqBtn"></button>
</div>

<h3 id="listingTitle"></h3>
<div id="results"></div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

/* SAFE SUPABASE */
let client=null;
try{
client = supabase.createClient("https://rmdpzvyypnkhadoqoidr.supabase.co
","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtZHB6dnl5cG5raGFkb3FvaWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjI4OTUsImV4cCI6MjA4OTM5ODg5NX0.U02QOs4Cqq0TxB1mMu8oo_lOlv-4m6lBZfgk9Bsa8vA");
}catch(e){}

/* LANGUAGE */
let lang="en";

const T={
en:{
search:"Search",
post:"Post Listing",
request:"Request Equipment",
submit:"Submit",
submitReq:"Submit Request",
listing:"Listings",
title:"Title",
category:"Category",
location:"Location",
price:"Price",
reqcat:"What do you need?",
type:[["rent","Rent"],["sell","Sell"]]
},
am:{
search:"ፈልግ",
post:"መረጃ አስገባ",
request:"ጥያቄ",
submit:"አስገባ",
submitReq:"ጥያቄ ላክ",
listing:"ዝርዝር",
title:"ርዕስ",
category:"ምድብ",
location:"ቦታ",
price:"ዋጋ",
reqcat:"ምን ይፈልጋሉ?",
type:[["rent","ኪራይ"],["sell","ሽያጭ"]]
}
};

function applyLang(){
const t=T[lang];

document.getElementById("searchBtn").innerText=t.search;
document.getElementById("postBtn").innerText=t.post;
document.getElementById("requestBtn").innerText=t.request;
document.getElementById("submitBtn").innerText=t.submit;
document.getElementById("submitReqBtn").innerText=t.submitReq;
document.getElementById("listingTitle").innerText=t.listing;

document.getElementById("title").placeholder=t.title;
document.getElementById("category").placeholder=t.category;
document.getElementById("location").placeholder=t.location;
document.getElementById("price").placeholder=t.price;
document.getElementById("searchInput").placeholder=t.search;

document.getElementById("req_category").placeholder=t.reqcat;
document.getElementById("req_location").placeholder=t.location;

const type=document.getElementById("type");
type.innerHTML="";
t.type.forEach(function(pair){
const opt=document.createElement("option");
opt.value=pair[0];
opt.textContent=pair[1];
type.appendChild(opt);
});
}

/* BUTTONS */
document.getElementById("langBtn").onclick=function(){
lang = (lang==="en")?"am":"en";
applyLang();
};

document.getElementById("postBtn").onclick=function(){
document.getElementById("postSection").style.display="block";
document.getElementById("requestSection").style.display="none";
};

document.getElementById("requestBtn").onclick=function(){
document.getElementById("postSection").style.display="none";
document.getElementById("requestSection").style.display="block";
};

document.getElementById("submitBtn").onclick=async function(){
if(!client){alert("No backend");return;}
await client.from("listings").insert([{
type:document.getElementById("type").value,
title:document.getElementById("title").value,
category:document.getElementById("category").value,
location:document.getElementById("location").value,
price:document.getElementById("price").value
}]);
alert("Saved");
};

document.getElementById("searchBtn").onclick=async function(){
if(!client){alert("No backend");return;}
const keyword=document.getElementById("searchInput").value.toLowerCase();
const {data}=await client.from("listings").select("*");

const results=document.getElementById("results");
results.innerHTML="";

data.filter(function(i){
return i.title && i.title.toLowerCase().includes(keyword);
}).forEach(function(i){
const d=document.createElement("div");
d.className="card";
d.innerHTML="<h4>"+i.title+"</h4><p>"+i.location+"</p><p>"+i.price+"</p>";
results.appendChild(d);
});
};

/* INIT */
applyLang();

});

</script>

</body>
</html>
