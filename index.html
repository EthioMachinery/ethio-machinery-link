<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ethio Machinery Link</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {margin:0;font-family:Arial;background:#111;color:#fff;}
header {background:#f4b400;color:black;text-align:center;padding:20px;}
.container {padding:15px;}

.search-box {display:flex;gap:10px;}
input {flex:1;padding:10px;border-radius:6px;border:none;}

.grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-top:20px;}

.card {background:#222;padding:15px;border-radius:10px;}
.card h3 {margin:0 0 10px;}
.tag {font-size:12px;background:#f4b400;color:black;padding:3px 6px;border-radius:4px;}

button {padding:10px;border:none;border-radius:6px;cursor:pointer;}
.primary {background:#f4b400;}
</style>
</head>

<body>

<header>
<h2 id="amh">ኢትዮ ማሽነሪ አገናኝ</h2>
<p id="eng">Ethio Machinery Link</p>
<button onclick="toggleLang()">🌐</button>
</header>

<div class="container">

<div class="search-box">
<input id="searchInput">
<button onclick="search()">🔍</button>
</div>

<div class="grid" id="listings"></div>

</div>

<script>

/* 🌐 LANGUAGE */
let lang="en";

const T={
en:{
search:"Search machinery, services, transport...",
rent:"Rent",
sell:"Sell",
service:"Service",
transport:"Transport"
},
am:{
search:"ማሽነሪ፣ አገልግሎት፣ ትራንስፖርት ፈልግ...",
rent:"ኪራይ",
sell:"ሽያጭ",
service:"አገልግሎት",
transport:"ትራንስፖርት"
}
};

/* 📦 SAMPLE DATA (LIKE REAL PLATFORM) */
let DATA=[
{title:"Excavator CAT 320",type:"rent",location:"Addis Ababa",price:"5000 ETB/day"},
{title:"Bulldozer D6",type:"sell",location:"Adama",price:"2.5M ETB"},
{title:"Hydraulic Repair Service",type:"service",location:"Addis Ababa",price:"Negotiable"},
{title:"Lowbed Truck Transport",type:"transport",location:"Nationwide",price:"Depends distance"}
];

/* 🎨 LOAD */
function load(data){
const container=document.getElementById("listings");
container.innerHTML="";

data.forEach(item=>{
const d=document.createElement("div");
d.className="card";

d.innerHTML=`
<span class="tag">${T[lang][item.type]}</span>
<h3>${item.title}</h3>
<p>${item.location}</p>
<p>${item.price}</p>
`;

container.appendChild(d);
});
}

/* 🔍 SEARCH */
function search(){
const keyword=document.getElementById("searchInput").value.toLowerCase();

const filtered=DATA.filter(i=>
i.title.toLowerCase().includes(keyword) ||
i.location.toLowerCase().includes(keyword)
);

load(filtered);
}

/* 🌐 TOGGLE */
function toggleLang(){
lang = (lang==="en") ? "am":"en";
document.getElementById("searchInput").placeholder=T[lang].search;
load(DATA);
}

/* INIT */
document.getElementById("searchInput").placeholder=T[lang].search;
load(DATA);

</script>

</body>
</html>
