<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EML Step 2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {margin:0;font-family:Arial;background:#111;color:#fff;}
header {background:#f4b400;color:black;text-align:center;padding:20px;}
.container {padding:15px;}
button {padding:10px;margin:5px;border:none;border-radius:6px;}
input,select {width:100%;padding:10px;margin:5px 0;border-radius:6px;border:none;}
</style>

<body>

<header>
<h2>ኢትዮ ማሽነሪ አገናኝ</h2>
<p>Ethio Machinery Link</p>
<button id="langBtn">🌐 Switch Language</button>
</header>

<div class="container">

<input id="searchInput">
<button id="searchBtn"></button>

<button id="postBtn"></button>

<div id="postSection">
<select id="type"></select>
<input id="title">
<input id="category">
<input id="location">
<input id="price">
<button id="submitBtn"></button>
</div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

/* SAFE SUPABASE INIT */
let client=null;
try{
client = supabase.createClient("https://rmdpzvyypnkhadoqoidr.supabase.co
L","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtZHB6dnl5cG5raGFkb3FvaWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjI4OTUsImV4cCI6MjA4OTM5ODg5NX0.U02QOs4Cqq0TxB1mMu8oo_lOlv-4m6lBZfgk9Bsa8vA");
console.log("Supabase connected");
}catch(e){
console.log("Supabase failed");
}

/* LANGUAGE SYSTEM */
let lang="en";

const T={
en:{
search:"Search",
post:"Post Listing",
submit:"Submit",
title:"Title",
category:"Category",
location:"Location",
price:"Price",
type:[["rent","Rent"],["sell","Sell"]]
},
am:{
search:"ፈልግ",
post:"መረጃ አስገባ",
submit:"አስገባ",
title:"ርዕስ",
category:"ምድብ",
location:"ቦታ",
price:"ዋጋ",
type:[["rent","ኪራይ"],["sell","ሽያጭ"]]
}
};

function applyLang(){
const t=T[lang];

document.getElementById("searchBtn").innerText=t.search;
document.getElementById("postBtn").innerText=t.post;
document.getElementById("submitBtn").innerText=t.submit;

document.getElementById("title").placeholder=t.title;
document.getElementById("category").placeholder=t.category;
document.getElementById("location").placeholder=t.location;
document.getElementById("price").placeholder=t.price;
document.getElementById("searchInput").placeholder=t.search;

const type=document.getElementById("type");
type.innerHTML="";
t.type.forEach(function(pair){
const opt=document.createElement("option");
opt.value=pair[0];
opt.textContent=pair[1];
type.appendChild(opt);
});
}

/* LANGUAGE TOGGLE */
document.getElementById("langBtn").onclick=function(){
lang = (lang==="en")?"am":"en";
applyLang();
};

/* SAVE LISTING (TEST BACKEND) */
document.getElementById("submitBtn").onclick=async function(){

if(!client){
alert("Backend not connected");
return;
}

try{
await client.from("listings").insert([{
type:document.getElementById("type").value,
title:document.getElementById("title").value,
category:document.getElementById("category").value,
location:document.getElementById("location").value,
price:document.getElementById("price").value
}]);

alert("Saved successfully ✅");

}catch(e){
alert("Error saving ❌");
console.log(e);
}

};

/* INIT */
applyLang();

});

</script>

</body>
</html>
