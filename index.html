<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EML - Smart Machinery Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {font-family:Arial;background:#111;color:#fff;text-align:center;}
header {background:#f4b400;padding:15px;}
input,select,textarea,button {
margin:5px;padding:10px;border-radius:6px;border:none;
}
.card {
background:#222;margin:10px;padding:10px;border-radius:8px;
}
</style>
</head>

<body>

<header>
<h2>ኢትዮ ማሽነሪ አገናኝ</h2>
<p>Ethio Machinery Link</p>
</header>

<h3>Post Listing (Supply)</h3>

<select id="type" onchange="showFields()">
<option value="">Select</option>
<option value="rent">Rent</option>
<option value="sell">Sell</option>
<option value="service">Service</option>
<option value="transport">Transport</option>
</select>

<input id="title" placeholder="Title">
<input id="category" placeholder="Category">

<div id="transportFields" style="display:none;">
<input id="truck_type" placeholder="Truck Type (Lowbed, Highbed)">
<input id="capacity_ton" placeholder="Capacity (ton)">
<input id="coverage_area" placeholder="Coverage Area">
</div>

<input id="location" placeholder="Location">
<input id="price" placeholder="Price">

<button onclick="addListing()">Submit Listing</button>

<hr>

<h3>Request (Demand)</h3>

<input id="req_category" placeholder="Need (Excavator, Transport...)">
<input id="req_location" placeholder="Location">
<input id="req_type" placeholder="Type (rent/buy/service)">
<button onclick="submitRequest()">Submit Request</button>

<hr>

<h3>AI Matching Results</h3>
<div id="matches"></div>

<script>

const SUPABASE_URL="https://rmdpzvyypnkhadoqoidr.supabase.co
L";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtZHB6dnl5cG5raGFkb3FvaWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjI4OTUsImV4cCI6MjA4OTM5ODg5NX0.U02QOs4Cqq0TxB1mMu8oo_lOlv-4m6lBZfgk9Bsa8vA";
const client = supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

function showFields(){
const type=document.getElementById("type").value;
document.getElementById("transportFields").style.display =
(type==="transport")?"block":"none";
}

async function addListing(){
await client.from("listings").insert([{
type:document.getElementById("type").value,
title:document.getElementById("title").value,
category:document.getElementById("category").value,
location:document.getElementById("location").value,
price:document.getElementById("price").value,
truck_type:document.getElementById("truck_type")?.value,
capacity_ton:document.getElementById("capacity_ton")?.value,
coverage_area:document.getElementById("coverage_area")?.value
}]);

alert("Listing Added");
}

async function submitRequest(){

const req = {
category:document.getElementById("req_category").value.toLowerCase(),
location:document.getElementById("req_location").value.toLowerCase(),
type:document.getElementById("req_type").value.toLowerCase()
};

const {data}=await client.from("listings").select("*");

const matches = data.filter(item=>{

return (
item.category?.toLowerCase().includes(req.category) &&
item.location?.toLowerCase().includes(req.location) &&
item.type?.toLowerCase().includes(req.type)
);

});

displayMatches(matches);
}

function displayMatches(matches){
const c=document.getElementById("matches");
c.innerHTML="";

if(matches.length===0){
c.innerHTML="No matches found";
return;
}

matches.forEach(m=>{
const d=document.createElement("div");
d.className="card";

d.innerHTML=`
<h4>${m.title}</h4>
<p>${m.category}</p>
<p>${m.location}</p>
<p>${m.price}</p>
`;

c.appendChild(d);
});
}

</script>

</body>
</html>
