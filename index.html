<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ethio Machinery Link</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {margin:0;font-family:Arial;background:#111;color:#fff;}
header {background:#f4b400;color:black;text-align:center;padding:20px;}
.container {padding:20px;}
.search-box {display:flex;gap:10px;margin-top:15px;}
.search-box input {flex:1;padding:12px;border-radius:8px;border:none;}
button {padding:10px;border:none;border-radius:6px;cursor:pointer;background:#f4b400;}
select,input {width:100%;padding:10px;margin-top:8px;border-radius:6px;border:none;}
.grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-top:20px;}
.card {background:#222;padding:15px;border-radius:10px;text-align:center;}
.listing-card {background:#222;padding:15px;border-radius:10px;margin-top:10px;}
.tag {background:#f4b400;color:black;padding:4px 8px;border-radius:4px;font-size:12px;}
</style>
</head>

<body>

<header>
<h2>ኢትዮ ማሽነሪ አገናኝ</h2>
<p>Ethio Machinery Link (EML)</p>
<button onclick="toggleLang()">🌐</button>
</header>

<div class="container">

<h2 id="hero"></h2>

<div class="search-box">
<input id="searchInput">
<button onclick="search()">🔍</button>
</div>

<div id="services" class="grid"></div>
<div id="categories" class="grid"></div>

<h2>Post Listing</h2>

<select id="postType" onchange="updateForm()">
<option value="">Select Type</option>
<option value="rent">Rent Machinery</option>
<option value="sell">Sell Machinery</option>
<option value="service">Service Provider</option>
<option value="transport">Transport</option>
</select>

<div id="dynamicForm"></div>

<button onclick="submitListing()">Submit</button>

<div id="listings"></div>

</div>

<script>

console.log("✅ JS LOADED");

/* 🔑 SUPABASE (REPLACE THESE) */
const SUPABASE_URL = "https://rmdpzvyypnkhadoqoidr.supabase.co
";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtZHB6dnl5cG5raGFkb3FvaWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjI4OTUsImV4cCI6MjA4OTM5ODg5NX0.U02QOs4Cqq0TxB1mMu8oo_lOlv-4m6lBZfgk9Bsa8vA";

/* 🌐 LANGUAGE */
let lang="en";

const T={
en:{
hero:"Find, Rent, Buy Machinery",
search:"Search...",
services:["Rent","Buy","Sell","Service","Transport"],
categories:["Excavator","Bulldozer","Crane","Loader"]
},
am:{
hero:"ማሽነሪ ፈልግ ኪራይ ግዢ",
search:"ፈልግ...",
services:["ኪራይ","ግዢ","ሽያጭ","አገልግሎት","ትራንስፖርት"],
categories:["ኤክስካቫተር","ቡልዶዘር","ክሬን","ሎደር"]
}
};

/* 🎨 UI */
function renderUI(){
try{
const t=T[lang];
document.getElementById("hero").innerText=t.hero;
document.getElementById("searchInput").placeholder=t.search;

const services=document.getElementById("services");
services.innerHTML="";
t.services.forEach(s=>{
services.innerHTML+=`<div class="card">${s}</div>`;
});

const cat=document.getElementById("categories");
cat.innerHTML="";
t.categories.forEach(c=>{
cat.innerHTML+=`<div class="card">${c}</div>`;
});
}catch(e){
console.error("UI ERROR:",e);
}
}

/* 🧠 FORM */
function updateForm(){
try{
const type=document.getElementById("postType").value;
const form=document.getElementById("dynamicForm");
form.innerHTML="";

if(type==="rent"||type==="sell"){
form.innerHTML=`
<input id="title" placeholder="Machine Name">
<input id="category" placeholder="Category">
<input id="model" placeholder="Model">
<input id="year" placeholder="Year">
<input id="capacity" placeholder="Capacity">
<input id="origin" placeholder="Country of Origin">
<input id="condition" placeholder="New / Used">
<input id="price" placeholder="Price">
<input id="location" placeholder="Location">
`;
}

else if(type==="service"){
form.innerHTML=`
<input id="title" placeholder="Service Title">
<input id="skill" placeholder="Skill">
<input id="experience" placeholder="Experience">
<input id="location" placeholder="Location">
`;
}

else if(type==="transport"){
form.innerHTML=`
<input id="title" placeholder="Transport Type">
<input id="truckType" placeholder="Truck Type">
<input id="capacity" placeholder="Capacity">
<input id="location" placeholder="Location">
`;
}
}catch(e){
console.error("FORM ERROR:",e);
}
}

/* 🚀 SUBMIT */
async function submitListing(){
try{

const type=document.getElementById("postType").value;

if(!type){
alert("Please select type");
return;
}

let data={
type:type,
title:document.getElementById("title")?.value || "",
location:document.getElementById("location")?.value || ""
};

if(type==="rent"||type==="sell"){
data.category=document.getElementById("category")?.value||"";
data.model=document.getElementById("model")?.value||"";
data.year=document.getElementById("year")?.value||"";
data.capacity=document.getElementById("capacity")?.value||"";
data.origin=document.getElementById("origin")?.value||"";
data.condition=document.getElementById("condition")?.value||"";
data.price=document.getElementById("price")?.value||"";
}

if(type==="service"){
data.skill=document.getElementById("skill")?.value||"";
data.experience=document.getElementById("experience")?.value||"";
}

if(type==="transport"){
data.truck_type=document.getElementById("truckType")?.value||"";
data.capacity=document.getElementById("capacity")?.value||"";
}

const res=await fetch(`${SUPABASE_URL}/rest/v1/listings`,{
method:"POST",
headers:{
"Content-Type":"application/json",
"apikey":SUPABASE_KEY,
"Authorization":"Bearer "+SUPABASE_KEY
},
body:JSON.stringify(data)
});

if(!res.ok){
throw new Error("Insert failed");
}

alert("✅ Submitted successfully");
loadListings();

}catch(err){
console.error("SUBMIT ERROR:",err);
alert("❌ Submission failed");
}
}

/* 📦 LOAD */
async function loadListings(){

const container=document.getElementById("listings");

if(!container){
console.log("No container");
return;
}

container.innerHTML="Loading...";

try{

const res=await fetch(`${SUPABASE_URL}/rest/v1/listings?select=*`,{
headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer "+SUPABASE_KEY
}
});

if(!res.ok){
throw new Error("Fetch error: "+res.status);
}

const data=await res.json();

if(!Array.isArray(data)){
container.innerHTML="⚠️ Data error";
return;
}

if(data.length===0){
container.innerHTML="No listings yet";
return;
}

container.innerHTML="";

data.forEach(i=>{
container.innerHTML+=`
<div class="listing-card">
<span class="tag">${i.type||""}</span>
<h3>${i.title||""}</h3>
<p>${i.location||""}</p>
<p>${i.price||""}</p>
</div>
`;
});

}catch(err){
console.error("LOAD ERROR:",err);
container.innerHTML="<p style='color:red;'>Failed to load</p>";
}

}

/* 🔍 SEARCH */
function search(){
loadListings();
}

/* 🌐 LANGUAGE */
function toggleLang(){
lang=(lang==="en")?"am":"en";
renderUI();
}

/* INIT */
renderUI();
loadListings();

</script>

</body>
</html>
